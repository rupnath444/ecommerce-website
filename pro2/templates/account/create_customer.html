{% extends 'main.html' %}
{% load static %}
{% block content %}

<h4>Create a new customer in database</h4>
    <div class="row">
        <div class="col-md-6">
            <div class="card card-body">
                
                <form action="{% url 'create_customer' %}" method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <a class="btn btn-warning" href="{% url 'home' %}">Back</a>
                    <input type="submit" name="submit">
                </form>
            </div>
        </div>  
    </div>
{% endblock content %}
