{% extends 'main.html' %}

{% block content %}

	<br>

	<div class="row">
		<div class="col-md">
			<div class="card card-body">
				<h5>Order List</h5>
			</div>
			<div class="card card-body">
				<table class="table">
					<tr>
						<th>Customer</th>
						<th>Product</th>
						<th>Date</th>
						<th>Status</th>
					</tr>

					{% for order in orders %}
						<tr>
							<td>{{order.customer}}</td>
							<td>{{order.product}}</td>
							<td>{{order.date_created}}</td>
							<td>{{order.status}}</td>
						</tr>
					{% endfor %}

				</table>
			</div>
		</div>
	</div>

{% endblock content %}
